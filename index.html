<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AlarmKu">
<meta name="description" content="Alarm clock web app - bisa install di HP">
<title>AlarmKu</title>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #f0f0fa;
    --muted: #6b6b8a;
    --green: #4ade80;
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* HEADER / CLOCK */
  .header {
    padding: 40px 24px 24px;
    text-align: center;
    position: relative;
  }
  .app-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .clock-display {
    font-family: 'Space Mono', monospace;
    font-size: clamp(52px, 18vw, 80px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .clock-date {
    font-size: 14px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 400;
  }

  /* TAB BAR */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 14px;
    margin: 0 24px 24px;
    padding: 4px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: white;
  }

  /* PANELS */
  .panel { display: none; padding: 0 24px; }
  .panel.active { display: block; }

  /* ALARM LIST */
  .alarm-list { display: flex; flex-direction: column; gap: 12px; }
  .alarm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .alarm-card.active-alarm {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(124, 106, 247, 0.15);
  }
  .alarm-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .alarm-card.active-alarm::before { opacity: 1; }
  .alarm-info { flex: 1 }
  .alarm-time {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .alarm-time.disabled { color: var(--muted); }
  .alarm-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .alarm-days {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .day-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
  }
  .day-dot.on { background: var(--accent); color: white; }

  .toggle-switch {
    width: 46px; height: 26px;
    background: var(--surface2);
    border-radius: 13px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
    border: none;
    outline: none;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-knob {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle-switch.on .toggle-knob { transform: translateX(20px); }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* ADD ALARM FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .form-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 18px; }
  .form-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }
  .time-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    padding: 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .time-input:focus { border-color: var(--accent); }
  .time-input::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.5;
  }

  .text-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--muted); }

  .day-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .day-pick-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-pick-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .sound-picker {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .sound-btn {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .sound-btn.selected {
    border-color: var(--accent);
    background: rgba(124,106,247,0.15);
    color: var(--accent);
  }
  .sound-btn.custom-sound { padding-right: 26px; white-space: nowrap; text-overflow: ellipsis; }
  .btn-del-sound {
    position: absolute; right: 5px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); font-size: 13px;
    cursor: pointer; padding: 2px; line-height: 1;
  }
  .btn-del-sound:hover { color: var(--accent2); }
  .upload-sound-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-top: 4px;
  }
  .upload-sound-area:hover, .upload-sound-area.drag { border-color: var(--accent); }
  .upload-sound-area input { display: none; }
  .upload-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .btn-add {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-add:active { transform: scale(0.98); opacity: 0.9; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .fab:active { transform: scale(0.92); }

  /* TIMER PANEL */
  .timer-display {
    text-align: center;
    padding: 32px 0;
  }
  .timer-time {
    font-family: 'Space Mono', monospace;
    font-size: clamp(48px, 16vw, 72px);
    font-weight: 700;
    color: var(--text);
  }
  .timer-time.running { color: var(--green); }
  .timer-presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .preset-btn {
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .timer-controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
  }
  .ctrl-btn {
    padding: 14px 32px;
    border-radius: 14px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn.primary { background: var(--accent); color: white; }
  .ctrl-btn.secondary { background: var(--surface2); color: var(--text); }
  .ctrl-btn:active { transform: scale(0.96); }

  /* RING OVERLAY */
  .ring-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.95);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .ring-overlay.show { display: flex; }
  .ring-icon { font-size: 80px; animation: ring-shake 0.5s infinite alternate; }
  @keyframes ring-shake {
    from { transform: rotate(-10deg) scale(1); }
    to { transform: rotate(10deg) scale(1.05); }
  }
  .ring-time {
    font-family: 'Space Mono', monospace;
    font-size: 60px;
    font-weight: 700;
    margin: 16px 0 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .ring-label { font-size: 20px; color: var(--muted); margin-bottom: 40px; }
  .btn-dismiss {
    padding: 18px 48px;
    background: var(--accent2);
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 17px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-snooze {
    padding: 14px 40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }

  /* INSTALL BANNER */
  .install-banner {
    display: none;
    background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(247,106,138,0.1));
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 14px;
    padding: 14px 18px;
    margin: 0 24px 20px;
    flex-direction: row;
    align-items: center;
    gap: 12px;
  }
  .install-banner.show { display: flex; }
  .install-text { flex: 1; font-size: 13px; line-height: 1.4; }
  .install-text strong { color: var(--accent); }
  .btn-install {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 14px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-close-banner {
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 0;
  }
</style>
</head>
<body>

<!-- RING OVERLAY -->
<div class="ring-overlay" id="ringOverlay">
  <div class="ring-icon">⏰</div>
  <div class="ring-time" id="ringTime">07:00</div>
  <div class="ring-label" id="ringLabel">Waktunya bangun!</div>
  <button class="btn-dismiss" onclick="dismissAlarm()">✓ Matikan</button>
  <button class="btn-snooze" onclick="snoozeAlarm()">💤 Snooze 5 menit</button>
</div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <span class="install-text"><strong>Install AlarmKu</strong><br>Pasang ke homescreen HP kamu</span>
  <button class="btn-install" id="btnInstall">Install</button>
  <button class="btn-close-banner" onclick="document.getElementById('installBanner').classList.remove('show')">×</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="app-title">AlarmKu</div>
  <div class="clock-display" id="clockDisplay">00:00</div>
  <div class="clock-date" id="clockDate">Loading...</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('alarms', this)">⏰ Alarm</button>
  <button class="tab-btn" onclick="showTab('add', this)">＋ Tambah</button>
  <button class="tab-btn" onclick="showTab('timer', this)">⏱ Timer</button>
</div>

<!-- ALARM LIST PANEL -->
<div class="panel active" id="panel-alarms">
  <div class="alarm-list" id="alarmList">
    <div class="empty-state">
      <div class="empty-icon">⏰</div>
      <div class="empty-text">Belum ada alarm.<br>Tap <strong>+ Tambah</strong> untuk buat alarm baru.</div>
    </div>
  </div>
</div>

<!-- ADD ALARM PANEL -->
<div class="panel" id="panel-add">
  <div class="form-card">
    <div class="form-title">Buat Alarm Baru</div>
    <div class="form-group">
      <label class="form-label">Jam</label>
      <input type="time" class="time-input" id="alarmTime" value="07:00">
    </div>
    <div class="form-group">
      <label class="form-label">Label</label>
      <input type="text" class="text-input" id="alarmLabel" placeholder="Contoh: Bangun pagi, Minum obat..." maxlength="40">
    </div>
    <div class="form-group">
      <label class="form-label">Hari</label>
      <div class="day-picker" id="dayPicker">
        <button class="day-pick-btn" data-day="0">Min</button>
        <button class="day-pick-btn selected" data-day="1">Sen</button>
        <button class="day-pick-btn selected" data-day="2">Sel</button>
        <button class="day-pick-btn selected" data-day="3">Rab</button>
        <button class="day-pick-btn selected" data-day="4">Kam</button>
        <button class="day-pick-btn selected" data-day="5">Jum</button>
        <button class="day-pick-btn" data-day="6">Sab</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Suara</label>
      <div class="sound-picker" id="soundPicker">
        <button class="sound-btn selected" data-sound="beep">🔔 Beep</button>
        <button class="sound-btn" data-sound="bell">🛎 Bell</button>
        <button class="sound-btn" data-sound="digital">📱 Digital</button>
        <button class="sound-btn" data-sound="gentle">🌅 Gentle</button>
      </div>
      <label class="upload-sound-area" id="uploadArea">
        <input type="file" id="soundFileInput" accept="audio/mp3,audio/wav,audio/ogg,audio/*">
        <div style="font-size:22px">🎵</div>
        <div class="upload-hint">Tap untuk upload suara sendiri<br><small>MP3, WAV, OGG — maks 2MB</small></div>
      </label>
    </div>
    <button class="btn-add" onclick="addAlarm()">+ Simpan Alarm</button>
  </div>
</div>

<!-- TIMER PANEL -->
<div class="panel" id="panel-timer">
  <div class="timer-presets">
    <button class="preset-btn" onclick="setTimer(1)">1 mnt</button>
    <button class="preset-btn" onclick="setTimer(5)">5 mnt</button>
    <button class="preset-btn" onclick="setTimer(10)">10 mnt</button>
    <button class="preset-btn" onclick="setTimer(15)">15 mnt</button>
    <button class="preset-btn" onclick="setTimer(30)">30 mnt</button>
    <button class="preset-btn" onclick="setTimer(60)">1 jam</button>
  </div>
  <div class="timer-display">
    <div class="timer-time" id="timerDisplay">00:00</div>
  </div>
  <div class="timer-controls">
    <button class="ctrl-btn secondary" onclick="resetTimer()">Reset</button>
    <button class="ctrl-btn primary" id="timerToggleBtn" onclick="toggleTimer()">Mulai</button>
  </div>
</div>

<script>
// ===== CLOCK =====
const DAYS_ID = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MONTHS_ID = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = now.getSeconds();
  document.getElementById('clockDisplay').textContent = `${h}:${m}`;
  document.getElementById('clockDate').textContent = 
    `${DAYS_ID[now.getDay()]}, ${now.getDate()} ${MONTHS_ID[now.getMonth()]} ${now.getFullYear()}`;
  
  // Check alarms every second
  if (s === 0 || (s === 1 && !window._lastCheck)) {
    window._lastCheck = true;
    checkAlarms(h, m, now.getDay());
  } else {
    window._lastCheck = false;
  }
}
setInterval(updateClock, 1000);
updateClock();

// ===== TABS =====
function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// ===== ALARMS =====
let alarms = JSON.parse(localStorage.getItem('alarmku_alarms') || '[]');
let ringingAlarm = null;
let audioCtx = null;
let ringingInterval = null;

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

let currentAudio = null;

function playSound(type) {
  // Custom sound (base64 audio)
  const custom = customSounds.find(s => s.id === type);
  if (custom) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const audio = new Audio(custom.dataUrl);
    audio.volume = 0.8;
    audio.play().catch(()=>{});
    currentAudio = audio;
    return 2; // approximate duration for interval calc
  }

  // Built-in synthesized sounds
  const ctx = getAudioContext();
  const patterns = {
    beep: [[880,0.1],[0,0.1],[880,0.1],[0,0.1],[880,0.3]],
    bell: [[523,0.1],[659,0.1],[784,0.4],[659,0.1],[784,0.5]],
    digital: [[1047,0.05],[0,0.05],[1047,0.05],[0,0.05],[1047,0.05],[0,0.05],[1047,0.15]],
    gentle: [[392,0.3],[440,0.3],[523,0.5]]
  };
  let t = ctx.currentTime;
  const seq = patterns[type] || patterns.beep;
  seq.forEach(([freq, dur]) => {
    if (freq > 0) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t);
      osc.stop(t + dur);
    }
    t += dur;
  });
  return t - ctx.currentTime;
}

function startRinging(alarm) {
  ringingAlarm = alarm;
  document.getElementById('ringTime').textContent = alarm.time;
  document.getElementById('ringLabel').textContent = alarm.label || 'Waktunya bangun!';
  document.getElementById('ringOverlay').classList.add('show');

  const custom = customSounds.find(s => s.id === alarm.sound);
  if (custom) {
    // Loop custom audio
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const audio = new Audio(custom.dataUrl);
    audio.loop = true;
    audio.volume = 0.8;
    audio.play().catch(()=>{});
    currentAudio = audio;
  } else {
    let duration = playSound(alarm.sound || 'beep');
    ringingInterval = setInterval(() => {
      playSound(alarm.sound || 'beep');
    }, (duration + 0.3) * 1000 + 500);
  }
  
  if ('vibrate' in navigator) navigator.vibrate([500, 200, 500, 200, 500]);
}

function dismissAlarm() {
  clearInterval(ringingInterval);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.getElementById('ringOverlay').classList.remove('show');
  if ('vibrate' in navigator) navigator.vibrate(0);
  ringingAlarm = null;
  renderAlarms();
}

function snoozeAlarm() {
  clearInterval(ringingInterval);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.getElementById('ringOverlay').classList.remove('show');
  if ('vibrate' in navigator) navigator.vibrate(0);
  
  if (ringingAlarm) {
    const now = new Date();
    now.setMinutes(now.getMinutes() + 5);
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const snooze = { ...ringingAlarm, id: Date.now(), time: `${h}:${m}`, label: '💤 Snooze: ' + (ringingAlarm.label || 'Alarm'), days: [], enabled: true };
    alarms.push(snooze);
    saveAlarms();
  }
  ringingAlarm = null;
  renderAlarms();
}

let checkedThisMinute = {};
function checkAlarms(h, m, dow) {
  const key = `${h}:${m}`;
  alarms.forEach(alarm => {
    if (!alarm.enabled) return;
    if (alarm.time !== key) return;
    if (alarm.days.length > 0 && !alarm.days.includes(dow)) return;
    if (checkedThisMinute[alarm.id + key]) return;
    checkedThisMinute[alarm.id + key] = true;
    setTimeout(() => delete checkedThisMinute[alarm.id + key], 70000);
    startRinging(alarm);
  });
}

const DAY_LABELS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
function renderAlarms() {
  const list = document.getElementById('alarmList');
  if (!alarms.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⏰</div><div class="empty-text">Belum ada alarm.<br>Tap <strong>+ Tambah</strong> untuk buat alarm baru.</div></div>`;
    return;
  }
  list.innerHTML = alarms.sort((a,b) => a.time.localeCompare(b.time)).map(alarm => `
    <div class="alarm-card ${alarm.enabled ? 'active-alarm' : ''}">
      <div class="alarm-info">
        <div class="alarm-time ${alarm.enabled ? '' : 'disabled'}">${alarm.time}</div>
        <div class="alarm-label">${alarm.label || 'Alarm'}</div>
        <div class="alarm-days">
          ${DAY_LABELS.map((d,i) => `<div class="day-dot ${alarm.days.includes(i) ? 'on' : ''}">${d[0]}</div>`).join('')}
        </div>
      </div>
      <button class="toggle-switch ${alarm.enabled ? 'on' : ''}" onclick="toggleAlarm('${alarm.id}')">
        <div class="toggle-knob"></div>
      </button>
      <button class="btn-delete" onclick="deleteAlarm('${alarm.id}')">🗑</button>
    </div>
  `).join('');
}

function toggleAlarm(id) {
  const a = alarms.find(x => x.id == id);
  if (a) { a.enabled = !a.enabled; saveAlarms(); renderAlarms(); }
}

function deleteAlarm(id) {
  alarms = alarms.filter(x => x.id != id);
  saveAlarms(); renderAlarms();
}

function saveAlarms() {
  localStorage.setItem('alarmku_alarms', JSON.stringify(alarms));
}

// ===== CUSTOM SOUNDS =====
let customSounds = JSON.parse(localStorage.getItem('alarmku_sounds') || '[]');
// {id, name, dataUrl}

function saveCustomSounds() {
  localStorage.setItem('alarmku_sounds', JSON.stringify(customSounds));
}

function renderSoundPicker() {
  const picker = document.getElementById('soundPicker');
  const currentSelected = picker.querySelector('.sound-btn.selected')?.dataset.sound || 'beep';
  
  // Built-in buttons
  let html = `
    <button class="sound-btn ${currentSelected==='beep'?'selected':''}" data-sound="beep" onclick="selectSound('beep',this)">🔔 Beep</button>
    <button class="sound-btn ${currentSelected==='bell'?'selected':''}" data-sound="bell" onclick="selectSound('bell',this)">🛎 Bell</button>
    <button class="sound-btn ${currentSelected==='digital'?'selected':''}" data-sound="digital" onclick="selectSound('digital',this)">📱 Digital</button>
    <button class="sound-btn ${currentSelected==='gentle'?'selected':''}" data-sound="gentle" onclick="selectSound('gentle',this)">🌅 Gentle</button>
  `;
  // Custom sound buttons
  customSounds.forEach(s => {
    html += `<button class="sound-btn custom-sound ${currentSelected===s.id?'selected':''}" data-sound="${s.id}" onclick="selectSound('${s.id}',this)" title="${s.name}">🎵 ${s.name}<button class="btn-del-sound" onclick="deleteCustomSound('${s.id}',event)">✕</button></button>`;
  });
  picker.innerHTML = html;
}

function selectSound(id, btn) {
  document.querySelectorAll('#soundPicker .sound-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  playSound(id);
}

function deleteCustomSound(id, e) {
  e.stopPropagation();
  customSounds = customSounds.filter(s => s.id !== id);
  saveCustomSounds();
  renderSoundPicker();
}

// Upload handler
document.getElementById('soundFileInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('File terlalu besar! Maks 2MB.'); return; }
  const name = file.name.replace(/\.[^.]+$/, '').slice(0, 20);
  const reader = new FileReader();
  reader.onload = (e) => {
    const id = 'custom_' + Date.now();
    customSounds.push({ id, name, dataUrl: e.target.result });
    saveCustomSounds();
    renderSoundPicker();
    // auto-select new sound
    setTimeout(() => {
      const btn = document.querySelector(`[data-sound="${id}"]`);
      if (btn) selectSound(id, btn);
    }, 50);
  };
  reader.readAsDataURL(file);
  this.value = '';
});

// Drag over upload area
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) {
    document.getElementById('soundFileInput').files = e.dataTransfer.files;
    document.getElementById('soundFileInput').dispatchEvent(new Event('change'));
  }
});

// ===== DAY PICKER =====
document.querySelectorAll('.day-pick-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('selected'));
});

// ===== SOUND PICKER =====
renderSoundPicker();

function addAlarm() {
  const time = document.getElementById('alarmTime').value;
  if (!time) { alert('Pilih jam dulu!'); return; }
  const label = document.getElementById('alarmLabel').value.trim();
  const days = [...document.querySelectorAll('.day-pick-btn.selected')].map(b => parseInt(b.dataset.day));
  const sound = document.querySelector('.sound-btn.selected')?.dataset.sound || 'beep';
  
  alarms.push({ id: Date.now(), time, label, days, sound, enabled: true });
  saveAlarms();
  renderAlarms();
  
  // reset form
  document.getElementById('alarmLabel').value = '';
  
  // go to list
  document.querySelectorAll('.tab-btn')[0].click();
  showTab('alarms', document.querySelectorAll('.tab-btn')[0]);
}

// ===== TIMER =====
let timerSeconds = 0;
let timerRemaining = 0;
let timerRunning = false;
let timerInterval = null;

function setTimer(minutes) {
  if (timerRunning) return;
  timerSeconds = minutes * 60;
  timerRemaining = timerSeconds;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  const el = document.getElementById('timerDisplay');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer-time' + (timerRunning ? ' running' : '');
}

function toggleTimer() {
  if (timerRemaining === 0 && !timerRunning) return;
  timerRunning = !timerRunning;
  document.getElementById('timerToggleBtn').textContent = timerRunning ? 'Pause' : 'Mulai';
  
  if (timerRunning) {
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerToggleBtn').textContent = 'Mulai';
        playSound('bell'); playSound('bell');
        if ('vibrate' in navigator) navigator.vibrate([300,100,300]);
        alert('⏰ Timer selesai!');
      }
    }, 1000);
  } else {
    clearInterval(timerInterval);
  }
  updateTimerDisplay();
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerRemaining = timerSeconds;
  document.getElementById('timerToggleBtn').textContent = 'Mulai';
  updateTimerDisplay();
}

// ===== PWA INSTALL =====
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('alarmku_installed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    localStorage.setItem('alarmku_installed', '1');
    document.getElementById('installBanner').classList.remove('show');
  }
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  localStorage.setItem('alarmku_installed', '1');
  document.getElementById('installBanner').classList.remove('show');
});

// ===== INIT =====
renderAlarms();
</script>
