<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bel Sekolah</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.header {
background: #020617;
padding: 15px;
text-align: center;
font-size: 22px;
}

.clock {
font-size: 60px;
text-align: center;
margin: 20px 0;
}

.container {
max-width: 450px;
margin: auto;
}

.card {
background: #1e293b;
padding: 15px;
margin: 10px;
border-radius: 12px;
}

input, select {
width: 90%;
padding: 10px;
margin: 5px;
border-radius: 6px;
border: none;
font-size: 16px;
}

button {
padding: 10px 15px;
margin: 5px;
border: none;
border-radius: 6px;
cursor: pointer;
font-size: 14px;
}

.add { background: #22c55e; color: white; }
.on { background: #22c55e; color: white; }
.off { background: #ef4444; color: white; }

.row {
display: flex;
justify-content: space-between;
align-items: center;
}

.small {
font-size: 14px;
opacity: 0.8;
} </style>

</head>
<body>

<div class="header">🔔 BEL SEKOLAH OTOMATIS</div>

<div class="clock" id="clock"></div>

<div class="container">

  <div class="card">
    <input type="time" id="jam">
    <input type="text" id="nama" placeholder="Contoh: Masuk">
    <select id="suara">
      <option value="suara/masuk.mp3">Masuk</option>
      <option value="suara/istirahat.mp3">Istirahat</option>
      <option value="suara/pulang.mp3">Pulang</option>
    </select>
    <button class="add" onclick="tambah()">+ Tambah Jadwal</button>
  </div>

  <div id="list"></div>

</div>

<audio id="audio"></audio>

<script>
let alarms = JSON.parse(localStorage.getItem("alarms")) || [];
let terakhir = "";

function simpan() {
  localStorage.setItem("alarms", JSON.stringify(alarms));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  alarms.forEach((a, i) => {
    list.innerHTML += `
      <div class="card">
        <div class="row">
          <div>
            <b>${a.jam}</b><br>
            <span class="small">${a.nama}</span>
          </div>
          <div>
            <button class="${a.aktif?'on':'off'}" onclick="toggle(${i})">
              ${a.aktif?'ON':'OFF'}
            </button>
            <button onclick="hapus(${i})">Hapus</button>
          </div>
        </div>
      </div>
    `;
  });
}

function tambah() {
  const jam = document.getElementById("jam").value;
  const nama = document.getElementById("nama").value;
  const suara = document.getElementById("suara").value;

  if (!jam || !nama) return alert("Isi dulu!");

  alarms.push({ jam, nama, suara, aktif: true });
  simpan();
  render();
}

function toggle(i) {
  alarms[i].aktif = !alarms[i].aktif;
  simpan();
  render();
}

function hapus(i) {
  alarms.splice(i, 1);
  simpan();
  render();
}

function jalan() {
  const now = new Date();
  const jam = now.toTimeString().slice(0,5);
  document.getElementById("clock").innerText = jam;

  alarms.forEach(a => {
    if (a.jam === jam && a.aktif && terakhir !== jam) {
      bunyi(a.suara);
      terakhir = jam;
    }
  });
}

function bunyi(src) {
  const audio = document.getElementById("audio");
  audio.src = src;
  audio.play();
}

setInterval(jalan, 1000);
render();
</script>

</body>
</html>
